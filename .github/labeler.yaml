github_actions:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".goreleaser.yaml"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "go.mod"
          - "go.sum"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"

crd:
  - changed-files:
      - any-glob-to-any-file:
          - "charts/magos/resources/crds/**"

chart:
  - changed-files:
      - any-glob-to-any-file:
          - "charts/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"

ui:
  - changed-files:
      - any-glob-to-any-file:
          - "ui/**"

api:
  - changed-files:
      - any-glob-to-any-file:
          - "api/**"

controllers:
  - changed-files:
      - any-glob-to-any-file:
          - "internal/controller/**"
