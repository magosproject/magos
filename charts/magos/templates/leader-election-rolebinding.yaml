{{- if and .Values.rbac.create .Values.leaderElection.enabled }}
{{- $root := . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "magos.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "magos.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "magos.fullname" . }}-leader-election
subjects:
{{- range $name, $controller := .Values.controllers }}
{{- if $controller.enabled }}
- kind: ServiceAccount
  name: {{ include "magos.controllerServiceAccountName" (dict "root" $root "name" $name "controller" $controller) }}
  namespace: {{ $root.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
