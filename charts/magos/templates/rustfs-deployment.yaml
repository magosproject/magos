{{- if .Values.logs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-rustfs" (include "magos.fullname" .) }}
  labels:
    {{- include "magos.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "magos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rustfs
  template:
    metadata:
      labels:
        {{- include "magos.labels" . | nindent 8 }}
        app.kubernetes.io/component: rustfs
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rustfs
        image: "{{ .Values.logs.storage.image.repository }}:{{ .Values.logs.storage.image.tag }}"
        imagePullPolicy: {{ .Values.logs.storage.image.pullPolicy }}
        args:
        - /data
        ports:
        - name: s3
          containerPort: {{ .Values.logs.storage.service.port }}
          protocol: TCP
        - name: console
          containerPort: {{ .Values.logs.storage.service.consolePort }}
          protocol: TCP
        env:
        - name: RUSTFS_ADDRESS
          value: ":{{ .Values.logs.storage.service.port }}"
        - name: RUSTFS_CONSOLE_ADDRESS
          value: ":{{ .Values.logs.storage.service.consolePort }}"
        - name: RUSTFS_CONSOLE_ENABLE
          value: "true"
        - name: RUSTFS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ printf "%s-rustfs" (include "magos.fullname" .) }}
              key: accessKey
        - name: RUSTFS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ printf "%s-rustfs" (include "magos.fullname" .) }}
              key: secretKey
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /data
        - name: logs
          mountPath: /logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ printf "%s-rustfs" (include "magos.fullname" .) }}
      - name: logs
        emptyDir: {}
{{- end }}
