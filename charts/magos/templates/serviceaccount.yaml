{{- $root := . -}}
{{- range $name, $controller := .Values.controllers }}
{{- if and $controller.enabled $controller.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "magos.controllerServiceAccountName" (dict "root" $root "name" $name "controller" $controller) }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "magos.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}-controller
  {{- with $controller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $controller.serviceAccount.automount }}
{{- end }}
{{- end }}
