{{- if .Values.logs.enabled }}
{{- $secretName := printf "%s-rustfs" (include "magos.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "magos.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
type: Opaque
{{- if $existing }}
data:
  {{- toYaml $existing.data | nindent 2 }}
{{- else }}
stringData:
  accessKey: {{ randAlphaNum 20 | quote }}
  secretKey: {{ randAlphaNum 40 | quote }}
{{- end }}
{{- end }}
