{{- if .Values.rustfs.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-rustfs" (include "magos.fullname" .) }}
  labels:
    {{- include "magos.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
type: Opaque
stringData:
  accessKey: {{ .Values.rustfs.auth.accessKey | quote }}
  secretKey: {{ .Values.rustfs.auth.secretKey | quote }}
{{- end }}
