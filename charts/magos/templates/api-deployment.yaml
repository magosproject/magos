{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "magos.fullname" . }}-api
  labels:
    {{- include "magos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "magos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "magos.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "magos.apiServiceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MAGOS_LOGS_ENABLED
          value: {{ .Values.logs.enabled | quote }}
        - name: MAGOS_LOGS_S3_BUCKET
          value: {{ .Values.logs.s3.bucket | quote }}
        - name: MAGOS_LOGS_S3_REGION
          value: {{ .Values.logs.s3.region | quote }}
        - name: MAGOS_LOGS_S3_ENDPOINT
          value: {{ default (printf "http://%s-rustfs:%v" (include "magos.fullname" .) .Values.rustfs.service.port) .Values.logs.s3.endpoint | quote }}
        - name: MAGOS_LOGS_S3_FORCE_PATH_STYLE
          value: {{ .Values.logs.s3.forcePathStyle | quote }}
        - name: MAGOS_LOGS_S3_INSECURE_SKIP_TLS_VERIFY
          value: {{ .Values.logs.s3.insecureSkipTLSVerify | quote }}
        - name: MAGOS_LOGS_S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ default (printf "%s-rustfs" (include "magos.fullname" .)) .Values.logs.s3.accessKeySecretRef.name }}
              key: {{ .Values.logs.s3.accessKeySecretRef.key }}
        - name: MAGOS_LOGS_S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ default (printf "%s-rustfs" (include "magos.fullname" .)) .Values.logs.s3.secretKeySecretRef.name }}
              key: {{ .Values.logs.s3.secretKeySecretRef.key }}
        {{- with .Values.api.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.podDefaults.containerSecurityContext | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
      terminationGracePeriodSeconds: 30
{{- end }}
