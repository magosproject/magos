---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workspaces.magosproject.io
spec:
  group: magosproject.io
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.projectRef.name
      name: Project
      type: string
    - jsonPath: .status.observedRevision
      name: Revision
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workspace is the Schema for the workspaces API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Workspace
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: |-
                  Annotations to propagate to both plan and apply Job pod templates.
                  Per-phase annotations in spec.plan or spec.apply take precedence on conflict.
                type: object
              apply:
                description: Apply holds overrides applied only to apply Jobs.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations to add to the Job's pod template. Merged on top of
                      spec.annotations; values here win on conflict.
                    type: object
                  timeoutSeconds:
                    description: |-
                      TimeoutSeconds sets the activeDeadlineSeconds on the Kubernetes Job.
                      If the Job does not finish within this duration, Kubernetes marks it
                      as Failed, preventing a Workspace from being stuck in Planning or
                      Applying indefinitely. When unset, DefaultJobTimeoutSeconds (86400) is
                      used.
                    format: int64
                    type: integer
                type: object
              autoApply:
                default: true
                description: AutoApply dictates whether the workspace should automatically
                  apply after a successful plan
                type: boolean
              plan:
                description: Plan holds overrides applied only to plan Jobs.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations to add to the Job's pod template. Merged on top of
                      spec.annotations; values here win on conflict.
                    type: object
                  timeoutSeconds:
                    description: |-
                      TimeoutSeconds sets the activeDeadlineSeconds on the Kubernetes Job.
                      If the Job does not finish within this duration, Kubernetes marks it
                      as Failed, preventing a Workspace from being stuck in Planning or
                      Applying indefinitely. When unset, DefaultJobTimeoutSeconds (86400) is
                      used.
                    format: int64
                    type: integer
                type: object
              projectRef:
                description: ProjectRef is a reference to the project this workspace
                  belongs to
                properties:
                  name:
                    description: Name of the Project.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              serviceAccountName:
                default: magos-job
                description: |-
                  ServiceAccountName is the ServiceAccount that plan and apply Job pods
                  run under. The ServiceAccount must exist in the same namespace as the
                  Workspace. Defaults to magos-job, which the Helm chart creates with
                  get;list;watch on validatingpolicies.policies.kyverno.io so the job can
                  fetch ValidatingPolicies at runtime. Override this to run pods under a
                  different identity, for example to bind a GKE Workload Identity or AWS
                  IRSA annotation; the replacement must carry the same RBAC.
                type: string
              source:
                description: Source defines the Git repository configuration
                properties:
                  path:
                    default: .
                    description: Path is the directory path within the Git repository
                    type: string
                  repoURL:
                    description: RepoURL is the URL of the Git repository to clone
                    type: string
                  targetRevision:
                    description: TargetRevision defines the commit, tag, or branch
                      to checkout
                    type: string
                required:
                - repoURL
                - targetRevision
                type: object
              terraform:
                description: Terraform defines the Terraform or OpenTofu configuration
                properties:
                  tfvarsPath:
                    description: TfvarsPath is the path to the tfvars file within
                      the repository
                    type: string
                  version:
                    description: Version is the Terraform or OpenTofu version to use
                    type: string
                required:
                - version
                type: object
              validation:
                description: |-
                  Validation configures plan-time policy validation for this Workspace.
                  When nil, the parent Project's Validation applies if set. When non-nil,
                  this fully overrides the Project default rather than merging with it.
                properties:
                  policySelector:
                    description: |-
                      PolicySelector selects Kyverno ValidatingPolicy resources
                      (policies.kyverno.io) by label. When nil, no policy validation is
                      performed. An empty selector ({}) matches every ValidatingPolicy in
                      the cluster. On a Project this acts as the default for any Workspace
                      that does not set its own Validation; on a Workspace this fully
                      overrides the Project default.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
            required:
            - projectRef
            - source
            - terraform
            type: object
          status:
            description: status defines the observed state of Workspace
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Workspace resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the last reconciliation
                format: date-time
                type: string
              message:
                description: Message is a human-readable explanation of the current
                  phase
                type: string
              nextReconcileTime:
                description: NextReconcileTime is the expected time of the next scheduled
                  reconciliation
                format: date-time
                type: string
              observedReconcileInterval:
                description: |-
                  ObservedReconcileInterval is the effective reconcile interval that the
                  controller last used when it wrote NextReconcileTime.

                  This is controller bookkeeping, not user intent. It lets the controller
                  detect when magosproject.io/reconcile-interval changed after a future
                  NextReconcileTime was already persisted, so users do not have to wait for
                  one extra stale schedule iteration before a new interval is honored.
                type: string
              observedRevision:
                description: |-
                  ObservedRevision is the git revision that was most recently observed/applied.
                  When the RefWatcher detects a new commit, this is the full commit SHA.
                  Otherwise it is the spec.source.targetRevision value (e.g. a branch name).
                type: string
              phase:
                description: Phase represents the current phase of the Workspace
                enum:
                - Pending
                - Reconciling
                - Ready
                - Idle
                - Planning
                - Planned
                - Applying
                - Applied
                - Failed
                - ValidationFailed
                - Deleting
                type: string
              policyViolations:
                description: |-
                  PolicyViolations records violations from the most recent policy validation
                  run. Populated when the plan job evaluates ValidatingPolicy resources and
                  one or more rules fail. Cleared at the start of each new plan cycle.
                items:
                  description: |-
                    PolicyViolation records a single failed policy assertion from a
                    ValidatingPolicy evaluation against a Terraform plan.
                  properties:
                    message:
                      description: Message is the human-readable violation message
                        from the rule definition.
                      type: string
                    policy:
                      description: Policy is the name of the ValidatingPolicy that
                        produced this violation.
                      type: string
                  required:
                  - message
                  - policy
                  type: object
                type: array
              reason:
                description: Reason is a brief CamelCase string explaining the current
                  phase
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
