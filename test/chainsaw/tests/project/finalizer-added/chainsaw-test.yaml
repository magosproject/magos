apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: finalizer-added
spec:
  description: |
    The Project controller installs its finalizer at the very top of
    Reconcile, before touching any other state, so that a later `kubectl
    delete` gets routed through handleDeletion instead of racing
    Kubernetes garbage collection. Without that window we would lose
    the ability to surface a Deleting phase for observability, and the
    object would disappear in the middle of a status update with no
    graceful exit path.
  steps:
  - try:
    - apply:
        resource:
          apiVersion: magosproject.io/v1alpha1
          kind: Project
          metadata:
            name: finalizer-project
          spec: {}
    - assert:
        resource:
          apiVersion: magosproject.io/v1alpha1
          kind: Project
          metadata:
            name: finalizer-project
            finalizers:
            - magosproject.io/finalizer
