apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: reconcile-interval-honored
spec:
  description: |
    The reconcile interval annotation is how users dial the drift
    detection cadence of a single Workspace away from the three
    minute default: a mostly static prod environment might set it to
    1h to ease API pressure, while a fast moving dev Workspace might
    stay at 30s. This test exercises the whole path: the annotation
    is parsed by getSyncInterval, used as the RequeueAfter, and then
    surfaced back into status.nextReconcileTime by
    updateNextReconcileTime. We deliberately do not assert a specific
    timestamp value because clock skew in CI makes that brittle, but
    we do assert the field is not null, which is enough to prove the
    controller ran its full bookkeeping at the end of the reconcile
    rather than bailing out early.
  steps:
  - try:
    - apply:
        resource:
          apiVersion: magosproject.io/v1alpha1
          kind: Workspace
          metadata:
            name: custom-interval-ws
            annotations:
              magosproject.io/reconcile-interval: "45m"
          spec:
            projectRef:
              name: no-project
            source:
              repoURL: https://example.invalid/repo.git
              targetRevision: main
            terraform:
              version: "1.14.8"
    - assert:
        resource:
          apiVersion: magosproject.io/v1alpha1
          kind: Workspace
          metadata:
            name: custom-interval-ws
            annotations:
              magosproject.io/reconcile-interval: "45m"
          status:
            phase: Pending
            reason: AwaitingRollout
            (nextReconcileTime != null): true
