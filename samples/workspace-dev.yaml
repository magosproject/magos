apiVersion: magosproject.io/v1alpha1
kind: Workspace
metadata:
  name: demo-dev
  namespace: default
  labels:
    env: dev
  annotations:
    magosproject.io/reconcile-interval: "40s"
spec:
  projectRef:
    name: demo-project
  # Needed for policy validation. The chart creates this ServiceAccount in
  # the release namespace; replicate it here or override the name if you
  # want a different identity.
  serviceAccountName: magos-job
  validation:
    policySelector:
      matchLabels:
        policy.magosproject.io/category: security
  source:
    repoURL: https://github.com/magosproject/demo.git
    targetRevision: main
    path: .
  terraform:
    version: "1.13.0"
    tfvarsPath: env/staging/vars.tfvars
