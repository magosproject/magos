apiVersion: v1
kind: ServiceAccount
metadata:
  name: magos-job
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: magos-job
rules:
- apiGroups: ["policies.kyverno.io"]
  resources: ["validatingpolicies"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: magos-job
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: magos-job
subjects:
- kind: ServiceAccount
  name: magos-job
  namespace: default
