apiVersion: v1
kind: Secret
metadata:
  name: magos-rustfs
  namespace: default
type: Opaque
stringData:
  accessKey: rustfsadmin
  secretKey: ChangeMe123!
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: magos-rustfs
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magos-rustfs
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: magos-rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magos-rustfs
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
      - name: rustfs
        image: rustfs/rustfs:latest
        args:
        - /data
        ports:
        - name: s3
          containerPort: 9000
        - name: console
          containerPort: 9001
        env:
        - name: RUSTFS_ADDRESS
          value: ":9000"
        - name: RUSTFS_CONSOLE_ENABLE
          value: "true"
        - name: RUSTFS_CONSOLE_ADDRESS
          value: ":9001"
        - name: RUSTFS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: magos-rustfs
              key: accessKey
        - name: RUSTFS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: magos-rustfs
              key: secretKey
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /data
        - name: logs
          mountPath: /logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: magos-rustfs
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: magos-rustfs
  namespace: default
spec:
  selector:
    app.kubernetes.io/name: magos-rustfs
  ports:
  - name: s3
    port: 9000
    targetPort: s3
    protocol: TCP
  - name: console
    port: 9001
    targetPort: console
    protocol: TCP
