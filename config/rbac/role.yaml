---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - magosproject.io
  resources:
  - projects
  - rollouts
  - variablesets
  - workspaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - magosproject.io
  resources:
  - projects/finalizers
  - rollouts/finalizers
  - variablesets/finalizers
  - workspaces/finalizers
  verbs:
  - update
- apiGroups:
  - magosproject.io
  resources:
  - projects/status
  - rollouts/status
  - variablesets/status
  - workspaces/status
  verbs:
  - get
  - patch
  - update
