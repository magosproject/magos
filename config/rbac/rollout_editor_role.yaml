# This rule is not used by the project magos itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the magosproject.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: magos
    app.kubernetes.io/managed-by: kustomize
  name: rollout-editor-role
rules:
- apiGroups:
  - magosproject.io
  resources:
  - rollouts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - magosproject.io
  resources:
  - rollouts/status
  verbs:
  - get
